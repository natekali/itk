name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux (x86_64 musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-musl-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Stage artifact
        run: cp target/x86_64-unknown-linux-musl/release/itk itk-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: itk-linux-x86_64
          path: itk-linux-x86_64

  build-linux-aarch64:
    name: Build Linux (aarch64 musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-aarch64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Stage artifact
        run: cp target/aarch64-unknown-linux-musl/release/itk itk-linux-aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: itk-linux-aarch64
          path: itk-linux-aarch64

  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-universal-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/itk \
            target/aarch64-apple-darwin/release/itk \
            -output itk-macos-universal

      - uses: actions/upload-artifact@v4
        with:
          name: itk-macos-universal
          path: itk-macos-universal

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x86_64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage artifact
        run: copy target\x86_64-pc-windows-msvc\release\itk.exe itk-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: itk-windows-x86_64
          path: itk-windows-x86_64.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-linux-aarch64, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "ITK ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/itk-linux-x86_64/itk-linux-x86_64
            artifacts/itk-linux-aarch64/itk-linux-aarch64
            artifacts/itk-macos-universal/itk-macos-universal
            artifacts/itk-windows-x86_64/itk-windows-x86_64.exe
          body: |
            ## ITK ${{ github.ref_name }}

            ### Install

            **Linux / macOS:**
            ```bash
            curl -fsSL https://itk-ai.app/install.sh | sh
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://itk-ai.app/install.ps1 | iex
            ```

            ### Quick start
            ```bash
            itk              # clipboard → clean → clipboard
            git diff | itk --diff --stats
            itk gain
            ```

            ### Binaries
            | Platform | File |
            |---|---|
            | Linux x86_64 (static musl) | `itk-linux-x86_64` |
            | Linux aarch64 (static musl) | `itk-linux-aarch64` |
            | macOS universal (Intel + Apple Silicon) | `itk-macos-universal` |
            | Windows x86_64 | `itk-windows-x86_64.exe` |
